<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <style>
        .container{
            width: 50%;
            height: 700px;
            border: 5px solid black;
            border-radius: 5px;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            grid-template-rows: repeat(7,1fr);
            margin-left: 25%;
            margin-right: 25%;
        }
        .box{
            border: 5px solid brown;
            background-color: black;
            color: white;

        }
        #i1{
            grid-row-start: 1;
            grid-row-end: 3;
            grid-column-start: 1;
            grid-column-end: 5;
        }
        #i2{
            grid-column-start:1;
            grid-column-end: 3;
        }
        #i17{
            grid-column-start:1;
            grid-column-end: 3;
        }
        .box{
            text-align: center;
            font-size: 300%;
        }
    </style>
</head>
<body>
    <div class="container">
    <div id="i1" class="box"></div>
    <div id="i2" class="box">AC</div>
    <div id="i3" class="box">DEL</div>
    <div id="i4" class="box">/</div>
    <div id="i5" class="box">7</div>
    <div id="i6" class="box">8</div>
    <div id="i7" class="box">9</div>
    <div id="i8" class="box">*</div>
    <div id="i9" class="box">4</div>
    <div id="i10" class="box">5</div>
    <div id="i11" class="box">6</div>
    <div id="i12" class="box">-</div>
    <div id="i13" class="box">1</div>
    <div id="i14" class="box">2</div>
    <div id="i15" class="box">3</div>
    <div id="i16" class="box">+</div>
    <div id="i17" class="box">0</div>
    <div id="i18" class="box">.</div>
    <div id="i19" class="box">=</div>
    </div>
    <script>
        const display = document.getElementById("i1");
        let currentInput = "";
        for (let i = 2; i <= 19; i++) {
        const button = document.getElementById("i" + i);
    
        if (button) {
            button.addEventListener("click", (event) => {
            const val = event.target.textContent;

            if (val === "AC") {
                currentInput = "";
            } 
            else if (val === "DEL") {
                
                currentInput = currentInput.slice(0, -1);
            } 
            else if (val === "=") {
            
                try {
            
                    currentInput = eval(currentInput).toString();
                } catch (error) {
                    currentInput = "Error";
                }
            } 
            else {
                
                currentInput += val;
            }
            display.textContent = currentInput;
        });
    }
}
        
        
    </script>
</body>
</html>
